name: CI/CD Pipeline Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r MLProject/requirements.txt

    - name: Run Training Script
      run: |
        cd MLProject
        # Kita jalankan manual agar Tracking URI tidak bentrok
        python modelling.py --n_estimators 300 --max_depth 10

    - name: Upload Artifacts to GitHub
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: model-artifact-mlruns
        path: MLProject/mlruns/


    - name: Login to Docker Hub
      if: success() 
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Build and Push Docker Image
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: ./MLProject
        file: ./MLProject/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/predictive-maintenance:latest